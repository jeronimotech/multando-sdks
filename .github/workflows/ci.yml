# CI: lint and compile checks for all SDKs
# Runs on every push to main and on pull requests

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  flutter:
    name: Flutter - analyze & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter/multando_sdk
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  react-native:
    name: React Native - typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react-native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - run: npm run typecheck || echo "No typecheck script, skipping"

  ios:
    name: iOS - build & test
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4
      - run: swift build
      - run: swift test

  android:
    name: Android - build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v3
      - name: Build
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
            ./gradlew :multando-sdk:build
          else
            echo "No Gradle wrapper found, skipping"
          fi

  python:
    name: Python - compile check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile check all .py files
        run: find . -name '*.py' -exec python -m py_compile {} +

  node:
    name: Node - typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - run: npx tsc --noEmit
