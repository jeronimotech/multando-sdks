# Release Node SDK to npm as @multando/node
# Trigger: push tag node-v* (e.g. node-v1.0.0)
# Required secrets: NPM_TOKEN

name: Release Node SDK

on:
  push:
    tags:
      - 'node-v*'

permissions:
  contents: write

jobs:
  publish:
    name: Build and publish to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
