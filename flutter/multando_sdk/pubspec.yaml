name: multando_sdk
description: >-
  Official Flutter SDK for the Multando traffic violation reporting platform.
  Report infractions, earn MULTA tokens, secure evidence capture with digital
  signatures, and integrate with the Multando API.
version: 0.1.0
homepage: https://multando.com
repository: https://github.com/jeronimotech/multando-sdks
issue_tracker: https://github.com/jeronimotech/multando-sdks/issues
documentation: https://multando.com/developers

topics:
  - traffic
  - reporting
  - blockchain
  - solana
  - civic-tech

screenshots:
  - description: 'Secure evidence capture with watermark'
    path: screenshots/capture.png

funding:
  - https://multando.com

platforms:
  android:
  ios:

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4
  flutter_secure_storage: ^9.0
  hive: ^2.2
  connectivity_plus: ^5.0
  json_annotation: ^4.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  json_serializable: ^6.7
  build_runner: ^2.4
  flutter_lints: ^3.0
